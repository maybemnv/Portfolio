<style>
  :root{
    --bg:#0a0a0a;
    --fg:#e8e8e8;
    --accent:#ff3c00;
    --muted:#444444;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'JetBrains Mono', ui-monospace, 'Courier New', monospace;
    font-size:15px;
    line-height:1.55;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* CRT scanline overlay — subtle, never blocks clicks or readability */
  .scanlines{
    position:fixed;
    inset:0;
    z-index:50;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      #000 0px,
      #000 1px,
      transparent 1px,
      transparent 3px
    );
    opacity:0.03;
  }

  #terminal{
    display:flex;
    flex-direction:column;
    position:relative;
    height:100vh;
    height:100dvh;
    max-width:1040px;
    margin:0 auto;
    padding:36px 20px 14px;
    border:2px solid var(--accent);
  }
  #terminal::before{
    content:"[ MANAV.EXE ]";
    position:absolute;
    top:-14px;
    left:16px;
    background:var(--bg);
    color:var(--accent);
    font-size:11px;
    letter-spacing:1.5px;
    padding:0 8px;
    line-height:1;
  }

  #output{
    flex:1 1 auto;
    overflow-y:auto;
    overflow-x:hidden;
    white-space:pre-wrap;
    word-break:break-word;
    padding-right:6px;
  }
  #output > div{ margin:0; }
  .block{ margin:2px 0 12px; }
  .block::after{
    content:"\25C8\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\25C8";
    display:block;
    width:fit-content;
    max-width:100%;
    overflow:hidden;
    color:#c0c0c0;
    font-size:12px;
    line-height:1.5;
    border-bottom:1px solid #c0c0c0;
    margin-top:8px;
  }

  #output::-webkit-scrollbar{ width:8px; }
  #output::-webkit-scrollbar-track{ background:transparent; }
  #output::-webkit-scrollbar-thumb{ background:#1c1c1c; border-radius:0; }

  .accent{ color:var(--accent); }
  .dim{ color:var(--muted); }

  .ascii{
    color:var(--accent);
    white-space:pre;
    line-height:1.05;
    font-weight:700;
    margin:8px 0 10px;
    text-shadow:0 0 9px rgba(255,60,0,0.45);
    overflow-x:auto;
  }

  #output a{
    color:var(--fg);
    text-decoration:underline;
    text-underline-offset:2px;
    text-decoration-color:#333;
  }
  #output a:hover{
    color:var(--accent);
    text-decoration-color:var(--accent);
  }

  /* Quick-nav pills — pinned above input, dim tag chips */
  #pills{
    display:none;
    flex-wrap:wrap;
    gap:8px;
    flex:0 0 auto;
    padding:10px 0 12px;
    margin-top:8px;
  }
  #pills::before{
    content:"\25C8\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\2501\25C8";
    display:block;
    width:fit-content;
    max-width:100%;
    overflow:hidden;
    color:#c0c0c0;
    font-size:12px;
    line-height:1.5;
    border-bottom:1px solid #c0c0c0;
    margin-bottom:10px;
  }
  .pill{
    font-family:inherit;
    font-size:12px;
    line-height:1;
    color:var(--muted);
    background:transparent;
    border:1px solid #222;
    border-radius:2px;
    padding:5px 8px;
    cursor:pointer;
    transition:color .15s ease, border-color .15s ease;
    -webkit-appearance:none;
  }
  .pill::before{ content:'['; }
  .pill::after{ content:']'; }
  .pill:hover,
  .pill:focus-visible{
    color:var(--fg);
    border-color:var(--accent);
    outline:none;
  }

  /* Input line */
  #inputLine{
    display:none;
    align-items:flex-start;
    flex:0 0 auto;
    position:relative;
  }
  .ps{ white-space:pre; }
  #mirror{ white-space:pre-wrap; word-break:break-word; }
  #cursor{
    display:inline-block;
    color:var(--fg);
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* Real input sits transparent on top of the line to capture typing/focus */
  #cmdInput{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    color:transparent;
    caret-color:transparent;
    font:inherit;
    padding:0;
    margin:0;
    resize:none;
  }

  #datestamp{
    position:absolute;
    bottom:40px;
    right:20px;
    color:var(--accent);
    opacity:0.5;
    font-size:11px;
    letter-spacing:0.5px;
    pointer-events:none;
  }

  @media (max-width:600px){
    body{ font-size:12px; }
    #terminal{ padding:14px 13px 10px; }
    .pill{ font-size:11px; }
    .ascii{ text-shadow:0 0 6px rgba(255,60,0,0.45); }
    #datestamp{ bottom:30px; font-size:10px; }
  }
</style>
</head>
<body>

  /* ---------- helpers ---------- */
  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  function scrollBottom(){ output.scrollTop = output.scrollHeight; }

  function escapeHtml(s){
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function norm(s){ return String(s).toLowerCase().replace(/[^a-z0-9]/g,''); }

  function aLink(url, label){
    var text = label || url;
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
  }

  function focusInput(){
    if (!booted) return;
    cmdInput.focus({ preventScroll:true });
  }

  function setMirror(v){ mirror.textContent = v; }

  function setVal(v){
    cmdInput.value = v;
    setMirror(v);
    requestAnimationFrame(function(){
      try { cmdInput.setSelectionRange(v.length, v.length); } catch(e){}
    });
  }

  function printHTML(html, cls){
    var d = document.createElement('div');
    if (cls) d.className = cls;
    d.innerHTML = html;
    output.appendChild(d);
    scrollBottom();
    return d;
  }

  function printBlock(html){ return printHTML(html, 'block'); }

  function printAscii(){
    var d = document.createElement('div');
    d.className = 'ascii';
    d.textContent = ASCII;
    output.appendChild(d);
    scrollBottom();
  }

  function padEnd(s, n){
    s = String(s);
    while (s.length < n) s += ' ';
    return s;
  }

  function commonPrefix(arr){
    if (!arr.length) return '';
    var p = arr[0];
    for (var i=1;i<arr.length;i++){
      while (arr[i].indexOf(p) !== 0){
        p = p.slice(0, -1);
        if (!p) return '';
      }
    }
    return p;
  }

  /* ---------- fuzzy project match ---------- */
  function findProject(q){
    var n = norm(q);
    if (!n) return null;
    var i, p;
    for (i=0;i<projects.length;i++){ p=projects[i];
      if (norm(p.slug)===n || norm(p.name)===n || norm(p.dir)===n) return p; }
    for (i=0;i<projects.length;i++){ p=projects[i];
      if (norm(p.slug).indexOf(n)===0 || norm(p.name).indexOf(n)===0) return p; }
    for (i=0;i<projects.length;i++){ p=projects[i];
      if (norm(p.slug).indexOf(n)>-1 || norm(p.name).indexOf(n)>-1) return p; }
    return null;
  }

  function exitHTML(){
    return '<span class="dim">nice try \u2014 you don\'t get to exit me that easily. you live in the terminal now. (type \'help\')</span>';
  }

  function cdCmd(dir){
    if (!dir || dir === '~') {
      prevCwd = cwd; cwd = '~';
    } else if (dir === '/') {
      prevCwd = cwd; cwd = '/';
    } else if (dir === '..') {
      prevCwd = cwd;
      if (cwd === '~' || cwd === '/') { /* stay put */ }
      else {
        var parts = cwd.split('/').filter(Boolean);
        parts.pop();
        cwd = parts.length ? '/' + parts.join('/') : '~';
      }
    } else if (dir === '-') {
      var tmp = cwd; cwd = prevCwd; prevCwd = tmp;
    } else if (dir === 'projects' || dir === 'projects/') {
      prevCwd = cwd; cwd = '~/projects';
    } else {
      printHTML('<span class="dim">cd: ' + escapeHtml(dir) + ': No such directory</span>');
      updatePromptPath();
      return;
    }
    updatePromptPath();
  }

  function pwdHTML(){
    return '<span class="dim">' + escapeHtml(cwd) + '</span>';
  }

  function dateHTML(){
    var d = new Date();
    return d.toString();
  }

  function historyHTML(){
    var lines = [];
    for (var i=0;i<commandHistory.length;i++){
      lines.push('<span class="dim">' + (i+1) + '  </span>' + escapeHtml(commandHistory[i]));
    }
    return lines.join('\n') || '<span class="dim">(no commands yet)</span>';
  }

  function echoHTML(text){
    return text || '';
  }

  function uptimeHTML(){
    var seconds = Math.floor((Date.now() - bootTime) / 1000);
    var mins = Math.floor(seconds / 60);
    var hrs = Math.floor(mins / 60);
    var days = Math.floor(hrs / 24);
    var parts = [];
    if (days) parts.push(days + 'd');
    if (hrs % 24) parts.push((hrs % 24) + 'h');
    if (mins % 60) parts.push((mins % 60) + 'm');
    parts.push((seconds % 60) + 's');
    return '<span class="dim">up</span> ' + parts.join(' ');
  }

  function unameHTML(){
    return 'PortfolioOS <span class="dim">arm64</span> <span class="dim">kernel 6.2.0-rc1 (terminal edition)</span>';
  }

  function sudoHTML(cmd){
    if (!cmd) return '<span class="accent">\u26a0</span> <span class="dim">sudo: what do you want me to run as root? nice try</span>';
    if (cmd.indexOf('rm') === 0) return '<span class="dim">sudo: ' + escapeHtml(cmd) + ': permission denied. you almost deleted my entire existence.</span>';
    return '<span class="dim">sudo: ' + escapeHtml(cmd) + ': permission denied. you\'re in a portfolio, not a terminal.</span>';
  }

  /* ---------- dispatch ---------- */
  function run(raw){
    var input = (raw == null ? '' : String(raw)).trim();

    printHTML(promptStr() + escapeHtml(input));

    if (input){
      commandHistory.push(input);
      if (commandHistory.length > 20) commandHistory.shift();
    }
    histIndex = commandHistory.length;

    if (input === ''){ afterRun(); return; }

    var parts = input.split(/\s+/);
    var cmd = parts[0].toLowerCase();
    var arg = input.slice(parts[0].length).trim();

    switch (cmd){
      case 'help':       printBlock(helpHTML()); break;
      case 'whoami':     printBlock(whoamiHTML()); break;
      case 'ls':         printBlock(lsHTML()); break;
      case 'cat':        catCmd(arg); break;
      case 'skills':     printBlock(skillsHTML()); break;
      case 'exp':
      case 'experience': printBlock(expHTML()); break;
      case 'contact':    printBlock(contactHTML()); break;
      case 'cd':         cdCmd(arg); break;
      case 'pwd':        printBlock(pwdHTML()); break;
      case 'date':       printBlock(dateHTML()); break;
      case 'history':    printBlock(historyHTML()); break;
      case 'echo':       printBlock(echoHTML(arg)); break;
      case 'uptime':     printBlock(uptimeHTML()); break;
      case 'uname':      printBlock(unameHTML()); break;
      case 'sudo':       printBlock(sudoHTML(arg)); break;
      case 'clear':      output.innerHTML = ''; break;
      case 'exit':
      case 'quit':       printBlock(exitHTML()); break;
      default:
        printHTML('command not found: ' + escapeHtml(parts[0]) +
          ' <span class="dim">\u2014 type \'help\'</span>');
    }
    afterRun();
  }

  function catCmd(arg){
    if (!arg){
      printHTML('<span class="dim">usage: cat &lt;project&gt; \u2014 run \'ls projects/\' to list them</span>');
      return;
    }
    var p = findProject(arg);
    if (!p){
      printHTML('cat: ' + escapeHtml(arg) +
        ': <span class="dim">no such project \u2014 run \'ls projects/\'</span>');
      return;
    }
    printBlock(catHTML(p));
  }

  function afterRun(){
    scrollBottom();
    focusInput();
  }

  /* ---------- input submit ---------- */
  function submit(){
    var v = cmdInput.value;
    cmdInput.value = '';
    setMirror('');
    run(v);
  }

  /* ---------- autocomplete ---------- */
  var COMMANDS = ['help','whoami','ls projects/','cat ','skills','exp','contact','cd ','pwd','date','history','echo ','uptime','uname','sudo ','clear','exit'];

  var DIRS = ['~', '/', 'projects/', '..', '-'];

  function autocomplete(){
    var v = cmdInput.value;
    var lower = v.toLowerCase();

    /* cat <fragment> → project slugs */
    if (lower.indexOf('cat ') === 0){
      var frag = norm(v.slice(4));
      var slugs = [];
      for (var i=0;i<projects.length;i++){
        var p = projects[i];
        if (!frag || norm(p.slug).indexOf(frag) === 0 || norm(p.name).indexOf(frag) === 0){
          slugs.push(p.slug);
        }
      }
      if (slugs.length === 1){ setVal('cat ' + slugs[0]); }
      else if (slugs.length > 1){
        printHTML('<span class="dim">' + slugs.join('   ') + '</span>');
        scrollBottom();
      }
      return;
    }

    /* cd <fragment> → directories */
    if (lower.indexOf('cd ') === 0){
      var dfrag = v.slice(3).trim();
      var dmatches = [];
      for (var d=0;d<DIRS.length;d++){
        if (DIRS[d].indexOf(dfrag) === 0) dmatches.push(DIRS[d]);
      }
      if (dmatches.length === 1){ setVal('cd ' + dmatches[0]); }
      else if (dmatches.length > 1){
        printHTML('<span class="dim">' + dmatches.join('   ') + '</span>');
        scrollBottom();
      }
      return;
    }

    /* general command completion */
    var matches = [];
    for (var k=0;k<COMMANDS.length;k++){
      if (COMMANDS[k].indexOf(lower) === 0) matches.push(COMMANDS[k]);
    }
    if (matches.length === 1){ setVal(matches[0]); }
    else if (matches.length > 1){
      var hints = [];
      for (var m=0;m<matches.length;m++) hints.push(matches[m].trim());
      printHTML('<span class="dim">' + hints.join('   ') + '</span>');
      var cp = commonPrefix(matches);
      if (cp && cp.length > v.length) setVal(cp);
      scrollBottom();
    }
  }

  /* ---------- pill auto-type ---------- */
  function autoType(cmd){
    if (busy || !booted) return;
    busy = true;
    cmdInput.value = '';
    setMirror('');
    focusInput();
    var i = 0;
    (function step(){
      if (i < cmd.length){
        cmdInput.value += cmd.charAt(i);
        setMirror(cmdInput.value);
        i++;
        setTimeout(step, 32);
      } else {
        setTimeout(function(){
          var v = cmdInput.value;
          cmdInput.value = '';
          setMirror('');
          run(v);
          busy = false;
        }, 140);
      }
    })();
  }

  /* ---------- events ---------- */
  cmdInput.addEventListener('input', function(){
    if (busy) return;
    setMirror(cmdInput.value);
  });

  cmdInput.addEventListener('keydown', function(e){
    if (busy){ e.preventDefault(); return; }

    if (e.key === 'Enter'){
      e.preventDefault();
      submit();
    } else if (e.key === 'ArrowUp'){
      e.preventDefault();
      if (!commandHistory.length) return;
      histIndex = Math.max(0, histIndex - 1);
      setVal(commandHistory[histIndex]);
    } else if (e.key === 'ArrowDown'){
      e.preventDefault();
      if (histIndex < commandHistory.length){
        histIndex++;
        setVal(histIndex === commandHistory.length ? '' : commandHistory[histIndex]);
      }
    } else if (e.key === 'Tab'){
      e.preventDefault();
      autocomplete();
    }
  });

  var pillBtns = pills.querySelectorAll('.pill');
  for (var b=0;b<pillBtns.length;b++){
    pillBtns[b].addEventListener('click', function(){
      autoType(this.getAttribute('data-cmd'));
    });
  }

  // Keep focus on the input after any click in the terminal (but allow link
  // clicks and text selection to work normally).
  document.addEventListener('click', function(e){
    if (!booted) return;
    if (e.target && e.target.tagName === 'A') return;
    var sel = window.getSelection ? String(window.getSelection()) : '';
    if (sel) return;
    focusInput();
  });

  /* ---------- boot sequence (~1.5s) ---------- */
  var bootLines = [
    'BIOS v2.6.0 ... OK',
    'LOADING KERNEL ... OK',
    'MOUNTING /home/manav ... OK'
  ];

  function typeLine(text){
    return new Promise(function(resolve){
      var line = document.createElement('div');
      output.appendChild(line);
      var i = 0;
      (function tick(){
        if (i <= text.length){
          line.textContent = text.slice(0, i);
          scrollBottom();
          i++;
          setTimeout(tick, 12);
        } else {
          resolve();
        }
      })();
    });
  }

  async function boot(){
    for (var i=0;i<bootLines.length;i++){
      await typeLine(bootLines[i]);
      await sleep(55);
    }
    await sleep(140);
    printAscii();
    await sleep(150);
    printHTML(promptStr() + 'SYSTEM ONLINE');
    printHTML(promptStr() + "type 'help' to get started");
    await sleep(120);

    booted = true;
    pills.style.display = 'flex';
    inputLine.style.display = 'flex';
    focusInput();
    scrollBottom();
  }

  // Wait for the webfont so the ASCII box-art lines up, but never hang on it.
  function start(){ boot(); }
  if (document.fonts && document.fonts.ready){
    var started = false;
    var go = function(){ if (started) return; started = true; start(); };
    document.fonts.ready.then(go);
    setTimeout(go, 1200);
  } else {
    start();
  }
})();
</script>
</body>
